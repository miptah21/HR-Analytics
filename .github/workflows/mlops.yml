name: HR MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
    - name: Install dependencies
      run: |
        uv pip install --system pandas numpy xgboost shap optuna scikit-learn matplotlib seaborn fastapi uvicorn pydantic google-genai fairlearn

    - name: Run Pipeline & Fairness Audit
      run: |
        uv run python src/train_attrition_model.py
